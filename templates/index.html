<!DOCTYPE html>
<html>
<head>
    <title>Phishing URL Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .box {
            width: 400px;
            margin: 150px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔍 Phishing URL Detector</h2>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL here" required>
        <br><br>
        <button type="submit">Check</button>
    </form>

    {% if result == "safe" %}
        <h3 style="color:green;">✔ This URL is Safe</h3>
    {% elif result == "phishing" %}
        <h3 style="color:red;">⚠ Phishing URL</h3>
    {% endif %}

    <p>Developed by Ektaa 🤍</p>
</div>

</body>
</html>
